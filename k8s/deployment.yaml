apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jenkins-demo-app
  template:
    metadata:
      labels:
        app: jenkins-demo-app
    spec:
      containers:
        - name: jenkins-demo-app
          image: jenkins-demo-app:local
          imagePullPolicy: Never   # use the image already on this machine, don't fetch from a registry
          ports:
            - containerPort: 3000